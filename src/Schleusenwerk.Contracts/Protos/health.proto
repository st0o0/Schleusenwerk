syntax = "proto3";
option csharp_namespace = "Schleusenwerk.Contracts";
import "google/protobuf/empty.proto";
import "Protos/common.proto";

service HealthService {
  rpc GetHealth (google.protobuf.Empty) returns (ProxyHealthResponse);
  rpc GetUpstreamHealth (GetUpstreamHealthRequest) returns (UpstreamHealthResponse);
}

message ProxyHealthResponse {
  int32 route_count = 1;
  int32 healthy_count = 2;
  int32 unhealthy_count = 3;
}

message GetUpstreamHealthRequest {
  string domain = 1;
}

message UpstreamHealthResponse {
  string domain = 1;
  repeated UpstreamHealthEntry upstreams = 2;
}
